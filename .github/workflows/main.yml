name: Build and Preview
on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # cache: 'npm' (removed to avoid build failure if lock file is not detected correctly)
          
      - name: Install dependencies
        run: npm install --no-audit --no-fund
        
      - name: Build project
        run: |
          npm run build
          touch dist/.nojekyll
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VITE_OTHER_KEY: ${{ secrets.VITE_OTHER_KEY }}
          CI: false # Prevents crashing on warnings

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
